name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read

env:
  REVIEWER_BOT_NAME: minibot
  REVIEWER_MODEL: oc-mini27
  REVIEWER_BASE_URL: ${{ secrets.LLM_URL }}

jobs:
  review:
    if: >-
      ${{
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Parse review command
        id: command
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEWER_BOT_NAME: ${{ env.REVIEWER_BOT_NAME }}
        run: |
          set -euo pipefail

          body="$(printf '%s' "$COMMENT_BODY" | tr -d '\r')"
          bot_re="$(printf '%s' "$REVIEWER_BOT_NAME" | sed 's/[][(){}.^$*+?|\\/]/\\&/g')"

          if [[ "$body" =~ ^@${bot_re}[[:space:]]+full[[:space:]]*$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "count=" >> "$GITHUB_OUTPUT"
          elif [[ "$body" =~ ^@${bot_re}[[:space:]]+last([[:space:]]+([0-9]+))?[[:space:]]*$ ]]; then
            count="${BASH_REMATCH[2]:-1}"

            if (( count < 1 )); then
              echo "Invalid command: last count must be >= 1" >&2
              exit 1
            fi

            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "mode=last" >> "$GITHUB_OUTPUT"
            echo "count=$count" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
