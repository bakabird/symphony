name: Mini Bot AI PR Review Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read

env:
  REVIEWER_BOT_NAME: minibot
  REVIEWER_MODEL: oc-mini27
  REVIEWER_BASE_URL: ${{ secrets.LLM_URL }}

jobs:
  review:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    steps:
      - uses: bakabird/prReviewer@main
        with:
          api_key: ${{ secrets.LLM_API_KEY }}
          github_token: ${{ github.token }}
          trigger: comment
          reviewer_bot_name: ${{ env.REVIEWER_BOT_NAME }}
          model: ${{ env.REVIEWER_MODEL }}
          base_url: ${{ env.REVIEWER_BASE_URL }}
          mode: multi
          max_lines: '1200'
          exclude: '*.lock,dist/**,node_modules/**'
